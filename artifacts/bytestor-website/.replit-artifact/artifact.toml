kind = "web"
previewPath = "/"
title = "ByteStor IT Services"
version = "1.0.0"
id = "artifacts/bytestor-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21027

[services.development]
run = "pnpm --filter @workspace/bytestor-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bytestor-website", "run", "build" ]
publicDir = "artifacts/bytestor-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21027"
BASE_PATH = "/"
